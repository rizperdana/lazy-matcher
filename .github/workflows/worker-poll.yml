name: Worker Poll

on:
  schedule:
    - cron: "*/2 * * * *" # Every 2 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger worker poll
        run: |
          for i in 1 2 3; do
            RESPONSE=$(curl -sf --max-time 90 -X GET \
              "https://lazy-matcher-perdanarizki5863-wonknjgm.leapcell.dev/api/v1/matches/worker/poll" \
              -H "Content-Type: application/json" \
              2>&1) && echo "Success: $RESPONSE" && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "All retries failed"
          exit 1
