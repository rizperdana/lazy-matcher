version: "3.8"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/lazy_matcher
      DATABASE_URL_SYNC: postgresql://postgres:postgres@host.docker.internal:54322/lazy_matcher
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker.runner --worker-id worker-1 --poll-interval 2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/lazy_matcher
      DATABASE_URL_SYNC: postgresql://postgres:postgres@host.docker.internal:54322/lazy_matcher
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker.runner --worker-id worker-2 --poll-interval 2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:54322/lazy_matcher
      DATABASE_URL_SYNC: postgresql://postgres:postgres@host.docker.internal:54322/lazy_matcher
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
