version: "3.8"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://neondb_owner:npg_UZ8qwH3tdmNo@ep-purple-silence-a1qdlxvr-pooler.ap-southeast-1.aws.neon.tech/neondb?ssl=require
      DATABASE_URL_SYNC: postgresql://neondb_owner:npg_UZ8qwH3tdmNo@ep-purple-silence-a1qdlxvr-pooler.ap-southeast-1.aws.neon.tech/neondb?ssl=require
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      GEMINI_AI_KEY: ${GEMINI_AI_KEY}
      OPENROUTER_KEY: ${OPENROUTER_KEY}
    ports:
      - "8000:8000"

  worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker.runner --worker-id worker-1 --poll-interval 2
    environment:
      DATABASE_URL: postgresql+asyncpg://neondb_owner:npg_UZ8qwH3tdmNo@ep-purple-silence-a1qdlxvr-pooler.ap-southeast-1.aws.neon.tech/neondb?ssl=require
      DATABASE_URL_SYNC: postgresql://neondb_owner:npg_UZ8qwH3tdmNo@ep-purple-silence-a1qdlxvr-pooler.ap-southeast-1.aws.neon.tech/neondb?ssl=require
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      GEMINI_AI_KEY: ${GEMINI_AI_KEY}
      OPENROUTER_KEY: ${OPENROUTER_KEY}

  worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker.runner --worker-id worker-2 --poll-interval 2
    environment:
      DATABASE_URL: postgresql+asyncpg://neondb_owner:npg_UZ8qwH3tdmNo@ep-purple-silence-a1qdlxvr-pooler.ap-southeast-1.aws.neon.tech/neondb?ssl=require
      DATABASE_URL_SYNC: postgresql://neondb_owner:npg_UZ8qwH3tdmNo@ep-purple-silence-a1qdlxvr-pooler.ap-southeast-1.aws.neon.tech/neondb?ssl=require
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      GEMINI_AI_KEY: ${GEMINI_AI_KEY}
      OPENROUTER_KEY: ${OPENROUTER_KEY}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
