version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lazy_matcher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lazy_matcher
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/lazy_matcher
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  worker-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker.runner --worker-id worker-1 --poll-interval 2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lazy_matcher
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/lazy_matcher
    depends_on:
      db:
        condition: service_healthy

  worker-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker.runner --worker-id worker-2 --poll-interval 2
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lazy_matcher
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/lazy_matcher
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
