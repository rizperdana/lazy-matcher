runtime: python
build: pip install --no-cache-dir .
start: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8080
port: 8080

# ========================================
# Leapcell Deployment Guide
# ========================================
#
# LEAPCELL RATE LIMITS (free tier):
#   Service Invocation: 100,000/mo
#   Memory × Duration: 6 GB·h/mo
#   Outbound Network: 2 GB/mo
#   Log Storage: 100 MB
#   Image Build: 1,000/mo
#   Redis Command: unlimited
#
# STRATEGY: Minimize invocations by:
#   1. API processes jobs INLINE (no worker invocation per job)
#   2. Worker uses --run-once mode (exit after processing, no persistent loop)
#   3. Worker triggered via Leapcell async call (not cron every 2s)
#
# SERVICE 1: API (Request-based)
#   Mode: Request-based (serverless)
#   Command: uvicorn app.main:app
#   Env vars: DATABASE_URL, GEMINI_AI_KEY, OPENROUTER_KEY, REDIS_URL
#   Behavior: Each API call processes jobs inline (~10-30s per batch)
#
# SERVICE 2: Worker (Request-based, triggered by async call)
#   Mode: Request-based (serverless)
#   Command: python -m app.worker.runner --run-once --max-idle 3
#   Env vars: DATABASE_URL, REDIS_URL, GEMINI_AI_KEY, OPENROUTER_KEY
#   Behavior: Processes all pending jobs then exits
#   Trigger: Leapcell async invocation (manual or external scheduler)
#   Note: Create as separate Leapcell service linked to same repo
#
# FALLBACK: If worker not deployed, API handles all processing inline
# (blocks request for ~10-30s per job, works fine for small batches)
#
# Required env vars for both services:
#   DATABASE_URL=postgresql://neondb_owner:npg_XXXX@ep-purple-silence-a1qdlxvr-pooler.ap-southeast-1.aws.neon.tech/neondb?ssl=require
#   REDIS_URL=rediss://:token@pumped-monarch-83792.upstash.io:6379?ssl_cert_reqs=required
#   GEMINI_AI_KEY=... (API service only, worker also needs it for scoring)
#   OPENROUTER_KEY=... (fallback LLM scoring)
